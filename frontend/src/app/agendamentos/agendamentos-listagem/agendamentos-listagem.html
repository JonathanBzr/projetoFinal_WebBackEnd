<h2>Agendamentos</h2>
<button matButton="filled" type="button" (click)="novo()">Novo Agendamento</button>
<hr />

<table mat-table [dataSource]="agendamentos()" class="mat-elevation-z8">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let e">{{ e.id }}</td>
  </ng-container>
  <ng-container matColumnDef="dataHora">
    <th mat-header-cell *matHeaderCellDef>Data / Hora</th>
    <td mat-cell *matCellDef="let e">{{ e.dataHora | date:'dd/MM/yyyy HH:mm' }}</td>
  </ng-container>
  <ng-container matColumnDef="animalId">
    <th mat-header-cell *matHeaderCellDef>Animal (ID)</th>
    <td mat-cell *matCellDef="let e">{{ e.animalId }}</td>
  </ng-container>
  <ng-container matColumnDef="servicoId">
    <th mat-header-cell *matHeaderCellDef>Serviço (ID)</th>
    <td mat-cell *matCellDef="let e">{{ e.servicoId }}</td>
  </ng-container>
  <ng-container matColumnDef="observacoes">
    <th mat-header-cell *matHeaderCellDef>Observações</th>
    <td mat-cell *matCellDef="let e">{{ e.observacoes }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="abrir(row)" class="linha-clicavel"></tr>
</table>

<h3>Total: {{ agendamentos().length }}</h3>
