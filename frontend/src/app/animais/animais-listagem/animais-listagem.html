<h2>Animais</h2>
<button matButton="filled" type="button" (click)="novo()">Novo Animal</button>
<hr />

<table mat-table [dataSource]="animais()" class="mat-elevation-z8">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let e">{{ e.id }}</td>
  </ng-container>
  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef>Nome</th>
    <td mat-cell *matCellDef="let e">{{ e.nome }}</td>
  </ng-container>
  <ng-container matColumnDef="especie">
    <th mat-header-cell *matHeaderCellDef>Espécie</th>
    <td mat-cell *matCellDef="let e">{{ e.especie }}</td>
  </ng-container>
  <ng-container matColumnDef="raca">
    <th mat-header-cell *matHeaderCellDef>Raça</th>
    <td mat-cell *matCellDef="let e">{{ e.raca }}</td>
  </ng-container>
  <ng-container matColumnDef="idade">
    <th mat-header-cell *matHeaderCellDef>Idade</th>
    <td mat-cell *matCellDef="let e">{{ e.idade }} ano(s)</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="abrir(row)" class="linha-clicavel"></tr>
</table>

<h3>Total: {{ animais().length }}</h3>
