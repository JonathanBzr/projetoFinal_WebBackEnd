<h2>Novo Cliente</h2>
<hr />

<form class="form">
  <mat-form-field appearance="outline">
    <mat-label>Nome</mat-label>
    <input matInput [(ngModel)]="cliente()!.nome" name="nome" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Telefone</mat-label>
    <input matInput [(ngModel)]="cliente()!.telefone" name="telefone" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>E-mail</mat-label>
    <input matInput type="email" [(ngModel)]="cliente()!.email" name="email" />
  </mat-form-field>

  <div class="acoes">
    <button matButton="filled" type="button" (click)="salvar()">Salvar</button>
    <button matButton="tonal" type="button" (click)="voltar()">Cancelar</button>
  </div>
</form>
