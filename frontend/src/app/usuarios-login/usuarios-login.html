<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>🐾 Petshop — Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Usuário</mat-label>
        <input matInput [(ngModel)]="usuario().login" name="login" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput type="password" [(ngModel)]="usuario().senha" name="senha" />
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button matButton="filled" (click)="entrar()">Entrar</button>
    </mat-card-actions>
  </mat-card>
</div>
